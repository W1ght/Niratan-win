name: CI - Unit Tests (xUnit)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build native dictionary library
        shell: pwsh
        run: .\build-native.ps1

      - name: Restore dependencies
        run: dotnet restore

      - name: Build main project (x64)
        run: dotnet build Hoshi/Hoshi.csproj --no-restore --configuration Debug --arch x64

      - name: Build and run unit tests (x64)
        run: dotnet test Hoshi.Tests/Hoshi.Tests.csproj --no-restore --configuration Debug --verbosity normal --arch x64 --collect:"XPlat Code Coverage" --logger trx

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
