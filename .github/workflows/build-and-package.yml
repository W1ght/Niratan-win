name: CI - Build and Package

on:
  workflow_dispatch:
  push:
    tags:
      - '**'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build native dictionary library
      shell: pwsh
      run: .\build-native.ps1

    - name: Publish Minimal
      run: dotnet publish Hoshi/Hoshi.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -p:PublishProfile=win-x64.pubxml

    - name: Create Minimal Zip
      shell: pwsh
      run: |
        Compress-Archive -Path Hoshi/bin/Release/net10.0-windows*/win-x64/publish/* -DestinationPath Hoshi.Minimal.x64.zip

    - name: Publish Full for Setup
      run: dotnet publish Hoshi/Hoshi.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -p:PublishProfile=win-x64.pubxml

    - name: Compile Inno Setup
      shell: pwsh
      run: |
        & "iscc.exe" Packaging/hoshi.iss

    - name: Upload Minimal Zip
      uses: actions/upload-artifact@v4
      with:
        name: Hoshi.Minimal.x64
        path: Hoshi.Minimal.x64.zip

    - name: Upload Setup Exe
      uses: actions/upload-artifact@v4
      with:
        name: Hoshi.Setup.x64
        path: Packaging/Hoshi.Setup.x64*.exe
