name: CI - Build and Package

on:
  workflow_dispatch:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build native dictionary library
      shell: pwsh
      run: .\build-native.ps1

    - name: Restore dependencies
      run: dotnet restore

    - name: Run Unit Tests
      run: dotnet test Hoshi.Tests/Hoshi.Tests.csproj --no-restore -c Debug --verbosity normal -p:Platform=x64 --logger trx

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: package-test-results
        path: '**/*.trx'

    - name: Publish Minimal
      run: dotnet publish Hoshi/Hoshi.csproj -c Release -r win-x64 --self-contained false -p:Platform=x64 -p:PublishProfile=win-x64.pubxml

    - name: Create Minimal Zip
      shell: pwsh
      run: |
        $publishDir = Get-ChildItem -Path Hoshi/bin -Recurse -Directory -Filter publish |
          Where-Object { $_.FullName -like '*\x64\Release\*win-x64*' } |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1
        if (-not $publishDir) {
          throw "Publish directory not found under Hoshi/bin"
        }
        if (-not (Test-Path (Join-Path $publishDir.FullName 'hoshidicts_c_api.dll'))) {
          throw "Native dictionary DLL missing from minimal publish output"
        }
        Compress-Archive -Path (Join-Path $publishDir.FullName '*') -DestinationPath Hoshi.Minimal.x64.zip

    - name: Publish Full for Setup
      run: dotnet publish Hoshi/Hoshi.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -p:PublishProfile=win-x64.pubxml

    - name: Verify Full Publish Contents
      shell: pwsh
      run: |
        $publishDir = Get-ChildItem -Path Hoshi/bin -Recurse -Directory -Filter publish |
          Where-Object { $_.FullName -like '*\x64\Release\*win-x64*' } |
          Sort-Object LastWriteTime -Descending |
          Select-Object -First 1
        if (-not $publishDir) {
          throw "Publish directory not found under Hoshi/bin"
        }
        if (-not (Test-Path (Join-Path $publishDir.FullName 'hoshidicts_c_api.dll'))) {
          throw "Native dictionary DLL missing from full publish output"
        }

    - name: Compile Inno Setup
      shell: pwsh
      run: |
        & "iscc.exe" Packaging/hoshi.iss

    - name: Upload Minimal Zip
      uses: actions/upload-artifact@v4
      with:
        name: Hoshi.Minimal.x64
        path: Hoshi.Minimal.x64.zip

    - name: Upload Setup Exe
      uses: actions/upload-artifact@v4
      with:
        name: Hoshi.Setup.x64
        path: Packaging/Hoshi.Setup.x64*.exe

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        name: Hoshi ${{ github.ref_name }}
        generate_release_notes: true
        files: |
          Hoshi.Minimal.x64.zip
          Packaging/Hoshi.Setup.x64*.exe
